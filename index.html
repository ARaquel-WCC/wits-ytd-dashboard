<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Desk — YTD 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    position: relative;
  }

  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-conic-gradient(rgba(0,0,0,0.008) 0% 25%, transparent 0% 50%) 0 0 / 4px 4px;
    pointer-events: none;
    z-index: 10;
  }

  /* === ANIMATIONS === */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes countUp {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes barGrow {
    from { transform: scaleY(0); }
    to { transform: scaleY(1); }
  }

  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 1px 8px rgba(0,0,0,0.05); }
    50% { box-shadow: 0 4px 20px rgba(0,113,227,0.1); }
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  @keyframes subtlePulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.75; }
  }

  @keyframes barShimmer {
    0% { filter: brightness(1); }
    50% { filter: brightness(1.15); }
    100% { filter: brightness(1); }
  }

  @keyframes quoteGlow {
    0%, 100% { box-shadow: 0 2px 12px rgba(0,180,216,0); }
    50% { box-shadow: 0 4px 24px rgba(0,180,216,0.15); }
  }

  @keyframes floatY {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }

  .grid {
    display: grid;
    width: 1200px;
    max-width: 100%;
    padding: 28px;
    gap: 6px;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    grid-template-areas:
      "hero     total    resolved  chart"
      "hero     open     restime   chart"
      "requests incidents types     types"
      "assignee assignee quote     quote";
    aspect-ratio: 52 / 25;
  }

  /* === TABLET (2-col) === */
  @media (max-width: 900px) {
    .grid {
      width: 100%;
      padding: 16px;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto;
      grid-template-areas:
        "hero     hero"
        "total    resolved"
        "open     restime"
        "chart    chart"
        "requests incidents"
        "types    types"
        "assignee assignee"
        "quote    quote";
      aspect-ratio: unset;
    }

    .hero-tagline, .hero-sub { font-size: 28px; }
    .card { padding: 16px 18px; border-radius: 14px; }
    .card-hero { padding: 20px; }
    .card-chart { padding: 16px; }
    .chart-bars { min-height: 100px; }
  }

  /* === MOBILE (1-col) === */
  @media (max-width: 540px) {
    .grid {
      padding: 12px;
      gap: 6px;
      grid-template-columns: 1fr;
      grid-template-areas:
        "hero"
        "total"
        "resolved"
        "chart"
        "open"
        "restime"
        "requests"
        "incidents"
        "types"
        "assignee"
        "quote";
    }

    .hero-tagline, .hero-sub { font-size: 24px; }
    .hero-eyebrow { font-size: 10px; }
    .hero-date { font-size: 11px; }
    .card { padding: 14px 16px; border-radius: 12px; }
    .card-hero { padding: 16px; }

    .num { font-size: 36px !important; }
    .label { font-size: 12px !important; }

    .category-name { font-size: 12px; }
    .category-focus { font-size: 10px; }
    .pill { font-size: 9px; padding: 2px 7px; }

    .chart-bars { min-height: 80px; }
    .bar-val { font-size: 9px; }
    .bar-lbl { font-size: 9px; }

    .assignee-name { width: 100px; font-size: 10px; }
    .assignee-count { font-size: 10px; }

    .quote-text { font-size: 14px; }

    .toggle-btn { font-size: 11px; padding: 5px 14px; }

    .modal { width: 95vw; max-height: 85vh; border-radius: 16px; }
    .modal-title { font-size: 15px; }
    .drill-num { font-size: 24px; }
    .drill-bar-label { width: 100px; font-size: 10px; }
  }

  /* === CARD BASE === */
  .card {
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.05);
    padding: 20px 22px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    overflow: hidden;
    animation: fadeInUp 0.6s ease-out both;
    transition: box-shadow 0.3s ease;
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.2s; }
  .card:nth-child(5) { animation-delay: 0.25s; }
  .card:nth-child(6) { animation-delay: 0.3s; }
  .card:nth-child(7) { animation-delay: 0.35s; }
  .card:nth-child(8) { animation-delay: 0.4s; }
  .card:nth-child(9) { animation-delay: 0.45s; }
  .card:nth-child(10) { animation-delay: 0.5s; }
  .card:nth-child(11) { animation-delay: 0.55s; }
  .card:nth-child(12) { animation-delay: 0.6s; }

  .num {
    font-family: 'Sora', sans-serif;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    animation: countUp 0.8s ease-out both;
    animation-delay: inherit;
  }

  .label {
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    color: #86868b;
    line-height: 1.25;
  }

  /* === HERO === */
  .card-hero {
    grid-area: hero;
    align-self: stretch;
    padding: 24px;
    animation: fadeInUp 0.6s ease-out 0.05s both, floatY 5s ease-in-out 1s infinite;
  }

  .card-hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #0071e3, #00b4d8, #0071e3);
    background-size: 200% 100%;
    border-radius: 18px 18px 0 0;
    animation: gradientShift 3s ease-in-out infinite;
  }

  .hero-eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: #0071e3;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    animation: slideInLeft 0.6s ease-out 0.2s both;
  }

  .hero-tagline {
    font-family: 'Sora', sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: #1d1d1f;
    letter-spacing: -0.03em;
    line-height: 1.1;
  }

  .hero-sub {
    font-family: 'Sora', sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: #86868b;
    letter-spacing: -0.03em;
    line-height: 1.1;
  }

  .hero-date {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: #aeaeb2;
    margin-top: 10px;
  }

  /* === STATS === */
  .card-total { grid-area: total; }
  .card-resolved { grid-area: resolved; }
  .card-open { grid-area: open; animation: fadeInUp 0.6s ease-out 0.25s both; }
  .card-restime { grid-area: restime; }

  .card-total .num,
  .card-resolved .num,
  .card-open .num,
  .card-restime .num {
    animation: countUp 0.8s ease-out both, subtlePulse 4s ease-in-out 1s infinite;
  }

  .card-open .num { animation-delay: 0.25s, 1.5s; }
  .card-restime .num { animation-delay: 0.3s, 2s; }

  .card-total:hover,
  .card-resolved:hover,
  .card-open:hover,
  .card-restime:hover {
    box-shadow: 0 4px 20px rgba(0,113,227,0.1);
    transition: box-shadow 0.3s ease;
  }

  /* === BAR CHART === */
  .card-chart {
    grid-area: chart;
    align-self: stretch;
    padding: 18px 20px;
  }

  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .chart-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: #86868b;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .chart-badge {
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    font-weight: 800;
    color: #0071e3;
  }

  .chart-bars {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    flex: 1;
    padding-top: 8px;
  }

  .bar-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex: 1;
  }

  .bar-val {
    font-family: 'Sora', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: #0071e3;
  }

  .bar {
    width: 100%;
    border-radius: 6px;
    transform-origin: bottom;
    animation: barGrow 1s ease-out both, barShimmer 3s ease-in-out 1.5s infinite;
  }

  .bar-group:nth-child(1) .bar { animation-delay: 0.4s; }
  .bar-group:nth-child(2) .bar { animation-delay: 0.6s; }
  .bar-group:nth-child(3) .bar { animation-delay: 0.8s; }

  .bar-lbl {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: #86868b;
  }

  /* === CATEGORY CARDS === */
  .card-requests {
    grid-area: requests;
    padding: 18px 20px;
  }

  .card-incidents {
    grid-area: incidents;
    padding: 18px 20px;
  }

  .card-types {
    grid-area: types;
    padding: 18px 20px;
  }

  .category-name {
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }

  .category-focus {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: #1d1d1f;
    margin-bottom: 6px;
  }

  .pills-wrap { display: flex; flex-wrap: wrap; gap: 0; }
  .pill {
    display: inline-block;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: #6e6e73;
    background: #f0f0f2;
    border-radius: 100px;
    padding: 3px 9px;
    margin: 2px 2px 2px 0;
    white-space: nowrap;
    transition: background 0.2s, color 0.2s;
  }

  .pill:hover {
    background: #0071e3;
    color: #fff;
  }

  /* === ASSIGNEE CARD === */
  .card-assignee {
    grid-area: assignee;
    padding: 18px 20px;
  }

  .assignee-bars {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 6px;
  }

  .assignee-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .assignee-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: #1d1d1f;
    width: 120px;
    flex-shrink: 0;
  }

  .assignee-bar-wrap {
    flex: 1;
    height: 16px;
    background: #f0f0f2;
    border-radius: 8px;
    overflow: hidden;
  }

  .assignee-bar-fill {
    height: 100%;
    border-radius: 8px;
    transform-origin: left;
    animation: barGrowH 1.2s ease-out both, barShimmer 3.5s ease-in-out 2s infinite;
  }

  @keyframes barGrowH {
    from { transform: scaleX(0); }
    to { transform: scaleX(1); }
  }

  .assignee-bar-fill:nth-of-type(1) { animation-delay: 0.6s; }

  .assignee-count {
    font-family: 'Sora', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: #86868b;
    width: 30px;
    text-align: right;
  }

  /* === QUOTE === */
  .card-quote {
    grid-area: quote;
    background: #1d1d1f;
    padding: 22px 28px;
    justify-content: center;
    animation: fadeInUp 0.6s ease-out 0.6s both, quoteGlow 4s ease-in-out 1s infinite;
  }

  .quote-text {
    font-family: 'Sora', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.01em;
    line-height: 1.35;
  }

  .quote-text em {
    color: #00b4d8;
    font-style: normal;
  }

  /* === HIGHLIGHT BADGE === */
  .resolution-badge {
    display: inline-block;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 100px;
    margin-top: 4px;
    width: fit-content;
  }

  .badge-green {
    background: rgba(52, 211, 153, 0.12);
    color: #059669;
  }

  .badge-blue {
    background: rgba(0, 113, 227, 0.1);
    color: #0071e3;
  }

  .badge-amber {
    background: rgba(245, 158, 11, 0.12);
    color: #d97706;
  }

  /* === CLICKABLE ELEMENTS === */
  .clickable {
    cursor: pointer;
  }

  .clickable:hover {
    box-shadow: 0 4px 20px rgba(0,113,227,0.12);
  }

  .pill.clickable:hover {
    background: #0071e3;
    color: #fff;
    box-shadow: none;
  }

  .assignee-row.clickable:hover {
    background: #f8f8fa;
    border-radius: 8px;
    box-shadow: none;
  }

  .assignee-row.clickable {
    padding: 2px 4px;
    margin: -2px -4px;
    cursor: pointer;
  }

  .bar-group.clickable {
    cursor: pointer;
    border-radius: 8px;
    padding: 4px;
    margin: -4px;
  }

  .bar-group.clickable:hover {
    background: rgba(0,113,227,0.04);
    box-shadow: none;
  }

  /* === MODAL OVERLAY === */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 100;
    justify-content: center;
    align-items: center;
    animation: fadeIn 0.2s ease-out;
  }

  .modal-overlay.active {
    display: flex;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes modalSlideUp {
    from { opacity: 0; transform: translateY(30px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .modal {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    width: 720px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    animation: modalSlideUp 0.3s ease-out;
    overflow: hidden;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px 16px;
    border-bottom: 1px solid #f0f0f2;
    flex-shrink: 0;
  }

  .modal-title {
    font-family: 'Sora', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: #1d1d1f;
    letter-spacing: -0.02em;
  }

  .modal-count {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #86868b;
    margin-left: 8px;
  }

  .modal-close {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: #f0f0f2;
    color: #86868b;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .modal-close:hover {
    background: #e0e0e2;
    color: #1d1d1f;
  }

  .modal-body {
    overflow-y: auto;
    padding: 0;
    flex: 1;
  }

  .modal-body::-webkit-scrollbar {
    width: 6px;
  }

  .modal-body::-webkit-scrollbar-thumb {
    background: #d0d0d2;
    border-radius: 3px;
  }

  /* === DRILL-DOWN CONTENT === */
  .drill-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 20px 24px;
  }

  .drill-grid.three-col {
    grid-template-columns: 1fr 1fr 1fr;
  }

  .drill-card {
    background: #f8f8fa;
    border-radius: 14px;
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .drill-card.full-width {
    grid-column: 1 / -1;
  }

  .drill-num {
    font-family: 'Sora', sans-serif;
    font-weight: 800;
    font-size: 32px;
    letter-spacing: -0.03em;
    line-height: 1;
  }

  .drill-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: #86868b;
  }

  .drill-section-title {
    font-family: 'Sora', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: #86868b;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 2px;
  }

  .drill-bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 3px 0;
  }

  .drill-bar-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: #1d1d1f;
    width: 130px;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .drill-bar-track {
    flex: 1;
    height: 14px;
    background: #eee;
    border-radius: 7px;
    overflow: hidden;
  }

  .drill-bar-fill {
    height: 100%;
    border-radius: 7px;
    transition: width 0.6s ease-out;
  }

  .drill-bar-count {
    font-family: 'Sora', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: #86868b;
    width: 32px;
    text-align: right;
  }

  .drill-mini-bars {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 80px;
    padding-top: 8px;
  }

  .drill-mini-bar-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    flex: 1;
  }

  .drill-mini-bar-val {
    font-family: 'Sora', sans-serif;
    font-size: 10px;
    font-weight: 700;
    color: #0071e3;
  }

  .drill-mini-bar {
    width: 100%;
    border-radius: 4px;
    transition: height 0.6s ease-out;
  }

  .drill-mini-bar-lbl {
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    font-weight: 600;
    color: #86868b;
    text-align: center;
  }

  .drill-pills-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }

  .drill-pill {
    display: inline-block;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 100px;
    background: #e8e8ea;
    color: #6e6e73;
  }

  /* === TOGGLE === */
  .toggle-wrap {
    display: flex;
    background: #f0f0f2;
    border-radius: 100px;
    padding: 3px;
    width: fit-content;
    margin-top: 12px;
  }

  .toggle-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 18px;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    background: transparent;
    color: #86868b;
    transition: all 0.3s ease;
  }

  .toggle-btn.active {
    background: #fff;
    color: #1d1d1f;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }

  .toggle-btn:hover:not(.active) {
    color: #1d1d1f;
  }

  /* Transition for data swap */
  .grid.switching {
    animation: fadeInUp 0.4s ease-out both;
  }
</style>
</head>
<body>
  <div class="grid" id="dashboard-grid"></div>

  <!-- DRILL-DOWN MODAL -->
  <div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header">
        <div>
          <span class="modal-title" id="modal-title"></span>
          <span class="modal-count" id="modal-count"></span>
        </div>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

<script>
/* eslint-disable */
let DATA = { it: [], ehr: [] };

// Auto-refresh every 30 minutes
setTimeout(() => location.reload(), 30 * 60 * 1000);

async function loadData() {
  try {
    const resp = await fetch('data.json?t=' + Date.now());
    DATA = await resp.json();
    buildDashboard(currentView);
  } catch(e) {
    console.error('Failed to load data:', e);
  }
}

loadData();


const CONFIG = {
  it: { eyebrow: 'Washburn IT Service Desk', title: 'IT', accent: '#0071e3', accent2: '#00b4d8' },
  ehr: { eyebrow: 'Washburn EHR Service Desk', title: 'EHR', accent: '#8b5cf6', accent2: '#a78bfa' }
};

let currentView = 'it';

// --- Helpers ---
const COLORS = ['#0071e3','#00b4d8','#34d399','#f59e0b','#ff6b6b','#8b5cf6','#ec4899','#059669'];

function countBy(arr, key) {
  const map = {};
  arr.forEach(t => { const v = t[key] || 'Unknown'; map[v] = (map[v]||0)+1; });
  return Object.entries(map).sort((a,b) => b[1]-a[1]);
}

function resTimes(tickets) {
  const results = [];
  tickets.forEach(t => {
    if (!t.resolved) return;
    const c = new Date(t.created);
    const r = new Date(t.resolved);
    if (isNaN(c) || isNaN(r)) return;
    const hrs = (r - c) / 3600000;
    if (hrs >= 0) results.push(hrs);
  });
  return results;
}

function median(arr) {
  if (!arr.length) return 0;
  const s = [...arr].sort((a,b)=>a-b);
  return s[Math.floor(s.length/2)];
}

function fmtHrs(h) {
  if (h < 1) return Math.round(h*60) + 'm';
  if (h < 48) return h.toFixed(1) + 'h';
  return (h/24).toFixed(1) + 'd';
}

// --- Build Dashboard ---
function buildDashboard(view) {
  const tickets = DATA[view];
  const cfg = CONFIG[view];
  const total = tickets.length;
  const resolved = tickets.filter(t => t.resolved).length;
  const open = total - resolved;
  const resolvedPct = total > 0 ? (resolved/total*100).toFixed(1) : '0';
  const times = resTimes(tickets);
  const med = times.length ? fmtHrs(median(times)) : '—';
  const avg = times.length ? fmtHrs(times.reduce((a,b)=>a+b,0)/times.length) : '—';
  // Calculate days based on actual ticket date range
  const dates = tickets.map(t => new Date(t.created)).sort((a,b) => a-b);
  const firstDate = dates[0];
  const lastDate = dates[dates.length - 1];
  const activeDays = Math.max(1, Math.ceil((lastDate - firstDate) / 86400000) + 1);
  const perDay = (total / activeDays).toFixed(1);

  // Monthly — dynamic: build counts for Jan through current month
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const currentMonth = new Date().getMonth(); // 0-indexed
  const monthCounts = Array(currentMonth + 1).fill(0);
  tickets.forEach(t => {
    const m = +t.created.slice(5,7) - 1; // 0-indexed
    if (m >= 0 && m <= currentMonth) monthCounts[m]++;
  });
  const monthMax = Math.max(...monthCounts, 1);

  // Top request types
  const reqTypes = countBy(tickets, 'reqType').filter(e => e[0] && e[0] !== 'Unknown');
  const topReqs = reqTypes.slice(0, 5);

  // Incidents vs service requests
  const byType = countBy(tickets, 'type');
  const incidents = tickets.filter(t => t.type.includes('Incident'));
  const incidentReqs = countBy(incidents, 'reqType').filter(e => e[0] && e[0] !== 'Unknown').slice(0, 4);

  // Status
  const byStatus = countBy(tickets, 'status');

  // Priority
  const byPriority = countBy(tickets, 'priority');
  const priSummary = byPriority.map(([p,c]) => `${c} ${p}`).join(' · ');

  // Assignees
  const assignees = countBy(tickets, 'assignee').filter(e => e[0] !== 'Unassigned').slice(0, 4);
  const maxAssignee = assignees[0]?.[1] || 1;

  // Bar colors cycle through palette as months are added
  const barColors = [
    ['#93c5fd','#2563eb'],
    ['#67e8f9','#0891b2'],
    ['#6ee7b7','#059669'],
    ['#c4b5fd','#7c3aed'],
    ['#fda4af','#e11d48'],
    ['#fcd34d','#d97706'],
    ['#a5f3fc','#0284c7'],
    ['#bbf7d0','#16a34a'],
    ['#fde68a','#b45309'],
    ['#f9a8d4','#be185d'],
    ['#bfdbfe','#1d4ed8'],
    ['#d9f99d','#4d7c0f'],
  ];

  const grid = document.getElementById('dashboard-grid');
  grid.className = 'grid switching';

  // Build assignee rows HTML
  const assigneeColors = ['#0071e3','#0891b2','#059669','#8b5cf6'];
  const assigneeRowsHTML = assignees.map(([name, count], i) => {
    const pct = (count / maxAssignee * 100).toFixed(1);
    const c = assigneeColors[i % assigneeColors.length];
    return `<div class="assignee-row clickable" onclick="drillDown('assignee:${name}', '${name} — Tickets')">
      <div class="assignee-name">${name}</div>
      <div class="assignee-bar-wrap">
        <div class="assignee-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${c}44,${c})"></div>
      </div>
      <div class="assignee-count" style="color:${c}">${count}</div>
    </div>`;
  }).join('');

  // Build request type pills
  const reqPillsHTML = topReqs.map(([name, count]) => {
    const short = name.replace('Emailed request','Email').replace('Recurring Task','Recurring').replace('Equipment requests','Equipment').replace('Report a ','').replace(' incident','').replace('Service Updates & Removal','Svc Updates').replace('Latency/System and Mobile Issues','Latency/Mobile').replace('Quality Assurance','QA').replace('Other question or request','Other').replace('Location Update','Location').replace('Episode Request','Episodes');
    return `<span class="pill clickable" onclick="drillDown('reqType:${name}', '${short}')">${short} (${count})</span>`;
  }).join('');

  // Build incident pills
  const incPillsHTML = incidentReqs.map(([name, count]) => {
    const short = name.replace('Report a ','').replace(' incident','').replace('Latency/System and Mobile Issues','Latency/Mobile');
    return `<span class="pill clickable" onclick="drillDown('reqType:${name}', '${short} Incidents')">${short} (${count})</span>`;
  }).join('');

  // Build status pills
  const statusPillsHTML = byStatus.map(([s, c]) => {
    const short = s.replace('Waiting for support','Waiting Support').replace('Waiting for customer','Waiting Customer').replace('Work in progress','WIP');
    return `<span class="pill clickable" onclick="drillDown('status:${s}', '${s} Tickets')">${short} (${c})</span>`;
  }).join('');

  // Type pills
  const typePillsHTML = byType.map(([t, c]) => {
    const short = t.replace('[System] ','');
    return `<span class="pill clickable" onclick="drillDown('type:${t}', '${short}')">${short} (${c})</span>`;
  }).join('');

  // Open badge text
  const waitSupport = byStatus.find(e => e[0].includes('support'));
  const openBadgeText = waitSupport ? `${waitSupport[1]} awaiting support` : `${open} unresolved`;

  // Resolution badge
  const resBadgeClass = resolvedPct >= 90 ? 'badge-green' : resolvedPct >= 70 ? 'badge-amber' : 'badge-amber';
  const resBadgeText = resolvedPct >= 90 ? 'Excellent resolution rate' : resolvedPct >= 70 ? 'Good resolution rate' : 'Needs attention';

  grid.innerHTML = `
    <div class="card card-hero">
      <div class="hero-eyebrow">${cfg.eyebrow}</div>
      <div class="hero-tagline">${cfg.title}</div>
      <div class="hero-tagline">Year in</div>
      <div class="hero-sub">Review.</div>
      <div class="hero-date">Jan 1 — ${new Date().toLocaleDateString('en-US', {month:'short', day:'numeric'})}, 2026 · YTD Dashboard</div>
      <img src="washburn-logo.png" alt="Washburn Center for Children" style="width:90px;opacity:0.85;margin-top:8px;">
      <div class="toggle-wrap">
        <button class="toggle-btn ${view==='it'?'active':''}" id="btn-it" onclick="switchView('it')">IT Service Desk</button>
        <button class="toggle-btn ${view==='ehr'?'active':''}" id="btn-ehr" onclick="switchView('ehr')">EHR</button>
      </div>
    </div>

    <div class="card card-total clickable" onclick="drillDown('all', 'All Tickets')">
      <div class="num" style="font-size:48px;color:${cfg.accent};margin-bottom:4px">${total}</div>
      <div class="label" style="font-size:13px">Total tickets <strong style="color:#1d1d1f;font-weight:600">YTD</strong></div>
      <div class="resolution-badge badge-blue">~${perDay} tickets/day</div>
    </div>

    <div class="card card-resolved clickable" onclick="drillDown('resolved', 'Resolved Tickets')">
      <div class="num" style="font-size:48px;color:#34d399;margin-bottom:4px">${resolvedPct}%</div>
      <div class="label" style="font-size:13px"><strong style="color:#1d1d1f;font-weight:600">${resolved}</strong> tickets resolved</div>
      <div class="resolution-badge ${resBadgeClass}">${resBadgeText}</div>
    </div>

    <div class="card card-chart">
      <div class="chart-header">
        <div class="chart-title">Monthly Volume</div>
        <div class="chart-badge">${total} YTD</div>
      </div>
      <div class="chart-bars">
        ${monthCounts.map((count, i) => {
          const mm = String(i + 1).padStart(2, '0');
          const lbl = i === currentMonth ? `${monthNames[i]}*` : monthNames[i];
          const fullName = new Date(2026, i, 1).toLocaleString('default', { month: 'long' });
          const [c0, c1] = barColors[i % barColors.length];
          return `<div class="bar-group clickable" onclick="drillDown('month:${mm}', '${fullName} Tickets')">
            <div class="bar-val">${count}</div>
            <div class="bar" style="height:${Math.max(8, count / monthMax * 140)}px;background:linear-gradient(180deg,${c0},${c1})"></div>
            <div class="bar-lbl">${lbl}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="card card-open clickable" onclick="drillDown('open', 'Open Tickets')">
      <div class="num" style="font-size:48px;color:#f59e0b;margin-bottom:4px">${open}</div>
      <div class="label" style="font-size:13px">Open tickets <strong style="color:#1d1d1f;font-weight:600">remaining</strong></div>
      <div class="resolution-badge badge-amber">${openBadgeText}</div>
    </div>

    <div class="card card-restime clickable" onclick="drillDown('slowest', 'Resolution Time')">
      <div class="num" style="font-size:44px;color:#00b4d8;margin-bottom:4px">${med}</div>
      <div class="label" style="font-size:13px">Median <strong style="color:#1d1d1f;font-weight:600">resolution</strong> time</div>
      <div class="resolution-badge badge-green">Avg: ${avg}</div>
    </div>

    <div class="card card-requests">
      <div class="category-name" style="color:${cfg.accent}">Top Requests</div>
      <div class="category-focus">${byType.find(e=>e[0].includes('request'))?.[1]||total} service requests total</div>
      <div class="pills-wrap">${reqPillsHTML}</div>
    </div>

    <div class="card card-incidents">
      <div class="category-name" style="color:#ff6b6b">Incidents</div>
      <div class="category-focus">${incidents.length} incidents reported</div>
      <div class="pills-wrap">${incPillsHTML || typePillsHTML}</div>
    </div>

    <div class="card card-types">
      <div class="category-name" style="color:#34d399">Priority & Status</div>
      <div class="category-focus">${priSummary}</div>
      <div class="pills-wrap">${statusPillsHTML}</div>
    </div>

    <div class="card card-assignee">
      <div class="category-name" style="color:${cfg.accent}">Team Workload</div>
      <div class="category-focus">Tickets assigned by technician</div>
      <div class="assignee-bars">${assigneeRowsHTML}</div>
    </div>

    <div class="card card-quote">
      <div class="quote-text">"<em>${total}</em> tickets handled, <em>${resolvedPct}%</em> resolved, median turnaround under <em>${med}</em>."</div>
    </div>
  `;

  // Re-apply hero accent color
  const heroBar = grid.querySelector('.card-hero::before');
  grid.querySelector('.card-hero').style.setProperty('--accent', cfg.accent);

  // Remove switching class after animation
  setTimeout(() => grid.classList.remove('switching'), 400);
}

function switchView(view) {
  if (view === currentView) return;
  currentView = view;
  document.getElementById('btn-it').classList.toggle('active', view === 'it');
  document.getElementById('btn-ehr').classList.toggle('active', view === 'ehr');

  // Update hero accent bar color dynamically
  const accent = CONFIG[view].accent;
  const accent2 = CONFIG[view].accent2;
  const style = document.querySelector('style');
  // We'll handle this via rebuilding
  buildDashboard(view);
}

// --- Drill-down (same as before) ---
function filterTickets(filter) {
  const tickets = DATA[currentView];
  if (filter === 'all') return [...tickets];
  if (filter === 'resolved') return tickets.filter(t => t.resolved);
  if (filter === 'open') return tickets.filter(t => !t.resolved);
  if (filter === 'slowest') return tickets.filter(t => t.resolved);
  if (filter.startsWith('month:')) { const m = filter.split(':')[1]; return tickets.filter(t => t.created.slice(5,7) === m); }
  if (filter.startsWith('status:')) { const s = filter.split(':').slice(1).join(':'); return tickets.filter(t => t.status === s); }
  if (filter.startsWith('type:')) { const ty = filter.split(':').slice(1).join(':'); return tickets.filter(t => t.type === ty); }
  if (filter.startsWith('reqType:')) { const rt = filter.split(':').slice(1).join(':'); return tickets.filter(t => t.reqType === rt); }
  if (filter.startsWith('assignee:')) { const a = filter.split(':').slice(1).join(':'); return tickets.filter(t => t.assignee === a); }
  return [];
}

function renderBars(entries, max, color) {
  return entries.map(([label, count], i) => {
    const pct = max > 0 ? (count / max * 100) : 0;
    const c = typeof color === 'string' ? color : COLORS[i % COLORS.length];
    return `<div class="drill-bar-row">
      <div class="drill-bar-label">${label}</div>
      <div class="drill-bar-track"><div class="drill-bar-fill" style="width:${pct}%;background:${c}"></div></div>
      <div class="drill-bar-count">${count}</div>
    </div>`;
  }).join('');
}

function renderMiniBars(entries, maxH) {
  const peak = Math.max(...entries.map(e=>e[1]),1);
  return `<div class="drill-mini-bars">${entries.map(([lbl,val],i) => {
    const h = Math.max(4, val/peak * maxH);
    return `<div class="drill-mini-bar-group">
      <div class="drill-mini-bar-val">${val}</div>
      <div class="drill-mini-bar" style="height:${h}px;background:${COLORS[i%COLORS.length]}"></div>
      <div class="drill-mini-bar-lbl">${lbl}</div>
    </div>`;
  }).join('')}</div>`;
}

function statCard(num, label, color) {
  return `<div class="drill-card"><div class="drill-num" style="color:${color}">${num}</div><div class="drill-label">${label}</div></div>`;
}

function buildDrillContent(filter, tickets) {
  const total = tickets.length;
  const resolved = tickets.filter(t => t.resolved).length;
  const open = total - resolved;
  const times = resTimes(tickets);
  const med = times.length ? fmtHrs(median(times)) : '—';
  const avg = times.length ? fmtHrs(times.reduce((a,b)=>a+b,0)/times.length) : '—';

  if (filter === 'all') {
    const byStatus = countBy(tickets, 'status');
    const byType = countBy(tickets, 'type');
    const byMonth = [['Jan',0],['Feb',0],['Mar',0]];
    tickets.forEach(t => { const m = +t.created.slice(5,7); if(m>=1&&m<=3) byMonth[m-1][1]++; });
    const byAssignee = countBy(tickets, 'assignee').filter(e=>e[0]!=='Unassigned').slice(0,5);
    const maxA = byAssignee[0]?.[1]||1;
    return `<div class="drill-grid">
      ${statCard(total,'Total Tickets','#0071e3')}
      ${statCard(resolved,'Resolved','#34d399')}
      ${statCard(open,'Open','#f59e0b')}
      ${statCard(med,'Median Resolution','#00b4d8')}
      <div class="drill-card full-width"><div class="drill-section-title">By Month</div>${renderMiniBars(byMonth, 60)}</div>
      <div class="drill-card"><div class="drill-section-title">By Status</div>${renderBars(byStatus, byStatus[0]?.[1]||1)}</div>
      <div class="drill-card"><div class="drill-section-title">By Type</div>${renderBars(byType, byType[0]?.[1]||1)}</div>
      <div class="drill-card full-width"><div class="drill-section-title">Top Assignees</div>${renderBars(byAssignee, maxA)}</div>
    </div>`;
  }

  if (filter === 'resolved') {
    const buckets = {'< 1h':0,'1–4h':0,'4–24h':0,'1–3d':0,'3–7d':0,'7d+':0};
    times.forEach(h => { if(h<1) buckets['< 1h']++; else if(h<4) buckets['1–4h']++; else if(h<24) buckets['4–24h']++; else if(h<72) buckets['1–3d']++; else if(h<168) buckets['3–7d']++; else buckets['7d+']++; });
    const bEntries = Object.entries(buckets);
    const byAssignee = countBy(tickets, 'assignee').filter(e=>e[0]!=='Unassigned').slice(0,5);
    const byReqType = countBy(tickets, 'reqType').filter(e=>e[0]!=='Unknown'&&e[0]).slice(0,6);
    return `<div class="drill-grid">
      ${statCard(resolved,'Resolved','#34d399')}
      ${statCard(med,'Median Time','#00b4d8')}
      ${statCard(avg,'Average Time','#0071e3')}
      ${statCard(times.length?fmtHrs(Math.min(...times)):'—','Fastest','#059669')}
      <div class="drill-card full-width"><div class="drill-section-title">Resolution Time Distribution</div>${renderMiniBars(bEntries, 60)}</div>
      <div class="drill-card"><div class="drill-section-title">By Assignee</div>${renderBars(byAssignee, byAssignee[0]?.[1]||1)}</div>
      <div class="drill-card"><div class="drill-section-title">By Request Type</div>${renderBars(byReqType, byReqType[0]?.[1]||1)}</div>
    </div>`;
  }

  if (filter === 'open') {
    const byStatus = countBy(tickets, 'status');
    const byAssignee = countBy(tickets, 'assignee').filter(e=>e[0]!=='Unassigned').slice(0,5);
    const byReqType = countBy(tickets, 'reqType').filter(e=>e[0]!=='Unknown'&&e[0]).slice(0,6);
    return `<div class="drill-grid">
      ${statCard(open,'Open Tickets','#f59e0b')}
      ${statCard(byStatus.find(e=>e[0].includes('support'))?.[1]||0,'Waiting Support','#0071e3')}
      ${statCard(byStatus.find(e=>e[0].includes('customer'))?.[1]||0,'Waiting Customer','#00b4d8')}
      ${statCard(byAssignee.length,'Assignees','#8b5cf6')}
      <div class="drill-card full-width"><div class="drill-section-title">By Status</div>${renderBars(byStatus, byStatus[0]?.[1]||1)}</div>
      <div class="drill-card"><div class="drill-section-title">By Assignee</div>${renderBars(byAssignee, byAssignee[0]?.[1]||1)}</div>
      <div class="drill-card"><div class="drill-section-title">By Request Type</div>${renderBars(byReqType, byReqType[0]?.[1]||1)}</div>
    </div>`;
  }

  if (filter === 'slowest') {
    const buckets = {'< 1h':0,'1–4h':0,'4–24h':0,'1–3d':0,'3–7d':0,'7–14d':0,'14d+':0};
    times.forEach(h => { if(h<1) buckets['< 1h']++; else if(h<4) buckets['1–4h']++; else if(h<24) buckets['4–24h']++; else if(h<72) buckets['1–3d']++; else if(h<168) buckets['3–7d']++; else if(h<336) buckets['7–14d']++; else buckets['14d+']++; });
    const bEntries = Object.entries(buckets);
    const pct1d = times.filter(h=>h<24).length;
    const pct1dPct = times.length?(pct1d/times.length*100).toFixed(0):'0';
    return `<div class="drill-grid">
      ${statCard(med,'Median','#00b4d8')}
      ${statCard(avg,'Average','#0071e3')}
      ${statCard(times.length?fmtHrs(Math.min(...times)):'—','Fastest','#059669')}
      ${statCard(times.length?fmtHrs(Math.max(...times)):'—','Slowest','#ff6b6b')}
      <div class="drill-card full-width"><div class="drill-section-title">Resolution Time Distribution</div>${renderMiniBars(bEntries, 60)}</div>
      <div class="drill-card full-width">
        ${statCard(pct1dPct + '%','Resolved within 24 hours (' + pct1d + ' of ' + times.length + ')','#34d399')}
      </div>
    </div>`;
  }

  // Generic
  const byStatus = countBy(tickets, 'status');
  const byAssignee = countBy(tickets, 'assignee').filter(e=>e[0]!=='Unassigned').slice(0,5);
  const byMonth = [['Jan',0],['Feb',0],['Mar',0]];
  tickets.forEach(t => { const m = +t.created.slice(5,7); if(m>=1&&m<=3) byMonth[m-1][1]++; });
  const resolvedPct = total > 0 ? (resolved/total*100).toFixed(0) + '%' : '—';
  let html = `<div class="drill-grid">
    ${statCard(total,'Total','#0071e3')}
    ${statCard(resolvedPct,'Resolved','#34d399')}
    ${statCard(med,'Median Resolution','#00b4d8')}
    ${statCard(avg,'Avg Resolution','#8b5cf6')}
    <div class="drill-card full-width"><div class="drill-section-title">By Month</div>${renderMiniBars(byMonth, 50)}</div>
    <div class="drill-card"><div class="drill-section-title">By Status</div>${renderBars(byStatus, byStatus[0]?.[1]||1)}</div>
    <div class="drill-card"><div class="drill-section-title">By Assignee</div>${renderBars(byAssignee, byAssignee[0]?.[1]||1)}</div>`;
  if (filter.startsWith('assignee:')) {
    const byReqType = countBy(tickets, 'reqType').filter(e=>e[0]!=='Unknown'&&e[0]).slice(0,8);
    html += `<div class="drill-card full-width"><div class="drill-section-title">Request Types</div>${renderBars(byReqType, byReqType[0]?.[1]||1)}</div>`;
  }
  html += '</div>';
  return html;
}

function drillDown(filter, title) {
  const tickets = filterTickets(filter);
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-count').textContent = tickets.length + ' tickets';
  document.getElementById('modal-body').innerHTML = buildDrillContent(filter, tickets);
  document.getElementById('modal-overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// Initial render
buildDashboard('it');
</script>
